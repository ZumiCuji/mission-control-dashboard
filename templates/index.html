<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mission Control Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; color: #00ff88; font-family: 'Courier New', monospace; padding: 20px; }
    h1 { text-align: center; font-size: 2em; margin-bottom: 30px; color: #00ff88; text-shadow: 0 0 20px #00ff88; letter-spacing: 4px; }
    h2 { color: #00ccff; margin-bottom: 15px; letter-spacing: 2px; font-size: 1.1em; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .panel { background: #0f0f2a; border: 1px solid #00ff8844; border-radius: 8px; padding: 20px; }
    .panel.full { grid-column: 1 / -1; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
    th { color: #00ccff; border-bottom: 1px solid #00ff8844; padding: 8px; text-align: left; }
    td { padding: 8px; border-bottom: 1px solid #ffffff11; }
    .hazardous { color: #ff4444; }
    .safe { color: #00ff88; }
    .loading { color: #666; font-style: italic; }
    .stat { font-size: 2em; color: #00ff88; text-shadow: 0 0 10px #00ff88; }
    .stat-label { font-size: 0.8em; color: #888; margin-top: 5px; }
    .stats-row { display: flex; gap: 20px; flex-wrap: wrap; }
    .stat-box { flex: 1; background: #0a0a1a; border-radius: 6px; padding: 15px; text-align: center; min-width: 120px; }
  </style>
</head>
<body>
  <h1>⚡ MISSION CONTROL</h1>

  <div class="grid">
    <!-- NEO Panel -->
    <div class="panel full">
      <h2>🌍 NEAR EARTH OBJECTS — ACTIVE TRACKING</h2>
      <table id="neo-table">
        <tr><th>Name</th><th>Date</th><th>Diameter (km)</th><th>Velocity (km/h)</th><th>Miss Distance (km)</th><th>Status</th></tr>
        <tr><td colspan="6" class="loading">Fetching asteroid data...</td></tr>
      </table>
    </div>

    <!-- Mars Panel -->
    <div class="panel">
      <h2>🔴 MARS WEATHER — INSIGHT LANDER</h2>
      <div id="mars-stats" class="loading">Fetching Mars data...</div>
      <div id="mars-chart" style="margin-top:15px;"></div>
    </div>

    <!-- Satellites Panel -->
    <div class="panel">
      <h2>🛰️ TRACKED ORBITAL OBJECTS</h2>
      <table id="sat-table">
        <tr><th>#</th><th>Object Name</th></tr>
        <tr><td colspan="2" class="loading">Fetching satellite data...</td></tr>
      </table>
    </div>
  </div>

  <script>
    // Fetch NEO data
    fetch("/api/neo").then(r => r.json()).then(data => {
      const table = document.getElementById("neo-table");
      table.innerHTML = `<tr><th>Name</th><th>Date</th><th>Diameter (km)</th><th>Velocity (km/h)</th><th>Miss Distance (km)</th><th>Status</th></tr>`;
      data.slice(0, 15).forEach(a => {
        table.innerHTML += `<tr>
          <td>${a.name}</td>
          <td>${a.date}</td>
          <td>${a.diameter_km}</td>
          <td>${a.velocity_kmh.toLocaleString()}</td>
          <td>${a.miss_distance_km.toLocaleString()}</td>
          <td class="${a.hazardous ? 'hazardous' : 'safe'}">${a.hazardous ? '⚠ HAZARDOUS' : '✓ SAFE'}</td>
        </tr>`;
      });
    });

    // Fetch Mars data
    fetch("/api/mars").then(r => r.json()).then(data => {
      const el = document.getElementById("mars-stats");
      if (!data.length) { el.innerHTML = "No active Mars weather data available."; return; }
      const latest = data[data.length - 1];
      el.innerHTML = `
        <div class="stats-row">
          <div class="stat-box"><div class="stat">${latest.avg_temp !== "N/A" ? latest.avg_temp + "°C" : "N/A"}</div><div class="stat-label">AVG TEMP</div></div>
          <div class="stat-box"><div class="stat">${latest.min_temp !== "N/A" ? latest.min_temp + "°C" : "N/A"}</div><div class="stat-label">MIN TEMP</div></div>
          <div class="stat-box"><div class="stat">${latest.max_temp !== "N/A" ? latest.max_temp + "°C" : "N/A"}</div><div class="stat-label">MAX TEMP</div></div>
          <div class="stat-box"><div class="stat">${latest.pressure !== "N/A" ? latest.pressure + " Pa" : "N/A"}</div><div class="stat-label">PRESSURE</div></div>
          <div class="stat-box"><div class="stat">${latest.wind_speed !== "N/A" ? latest.wind_speed + " m/s" : "N/A"}</div><div class="stat-label">WIND</div></div>
        </div>
        <div style="margin-top:10px; color:#666; font-size:0.8em;">Sol ${latest.sol}</div>`;

      // Temperature chart
      const sols = data.map(d => "Sol " + d.sol);
      const temps = data.map(d => d.avg_temp);
      Plotly.newPlot("mars-chart", [{
        x: sols, y: temps, type: "scatter", mode: "lines+markers",
        line: { color: "#ff4444" }, marker: { color: "#ff4444" }, name: "Avg Temp"
      }], {
        paper_bgcolor: "transparent", plot_bgcolor: "transparent",
        font: { color: "#888", family: "Courier New" },
        xaxis: { gridcolor: "#ffffff11" }, yaxis: { gridcolor: "#ffffff11", title: "°C" },
        margin: { t: 10, b: 40, l: 50, r: 10 }, height: 200
      });
    });

    // Fetch Satellite data
    fetch("/api/satellites").then(r => r.json()).then(data => {
      const table = document.getElementById("sat-table");
      table.innerHTML = `<tr><th>#</th><th>Object Name</th></tr>`;
      data.forEach((s, i) => {
        table.innerHTML += `<tr><td>${i + 1}</td><td>${s.name}</td></tr>`;
      });
    });
  </script>
</body>
</html>
