<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mission Control Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; color: #00ff88; font-family: 'Courier New', monospace; padding: 20px; }
    h1 { text-align: center; font-size: 2em; margin-bottom: 30px; color: #00ff88; text-shadow: 0 0 20px #00ff88; letter-spacing: 4px; }
    h2 { color: #00ccff; margin-bottom: 15px; letter-spacing: 2px; font-size: 1.1em; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .panel { background: #0f0f2a; border: 1px solid #00ff8844; border-radius: 8px; padding: 20px; }
    .panel.full { grid-column: 1 / -1; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
    th { color: #00ccff; border-bottom: 1px solid #00ff8844; padding: 8px; text-align: left; }
    td { padding: 8px; border-bottom: 1px solid #ffffff11; }
    .hazardous { color: #ff4444; }
    .safe { color: #00ff88; }
    .loading { color: #666; font-style: italic; }
    .stat { font-size: 2em; color: #00ff88; text-shadow: 0 0 10px #00ff88; }
    .stat-label { font-size: 0.8em; color: #888; margin-top: 5px; }
    .stats-row { display: flex; gap: 20px; flex-wrap: wrap; }
    .stat-box { flex: 1; background: #0a0a1a; border-radius: 6px; padding: 15px; text-align: center; min-width: 120px; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .panel.full { grid-column: 1; } }
  </style>
</head>
<body>
  <h1>⚡ MISSION CONTROL</h1>

  <div class="grid">
    <div class="panel full">
      <h2>🌍 NEAR EARTH OBJECTS — ACTIVE TRACKING</h2>
      <table id="neo-table">
        <tr><th>Name</th><th>Date</th><th>Diameter (km)</th><th>Velocity (km/h)</th><th>Miss Distance (km)</th><th>Status</th></tr>
        <tr><td colspan="6" class="loading">Fetching asteroid data...</td></tr>
      </table>
    </div>

    <div class="panel">
      <h2>🔴 MARS WEATHER — INSIGHT LANDER</h2>
      <div id="mars-stats" class="loading">Fetching Mars data...</div>
      <div id="mars-chart" style="margin-top:15px;"></div>
    </div>

    <div class="panel">
      <h2>🛰️ TRACKED ORBITAL OBJECTS</h2>
      <table id="sat-table">
        <tr><th>#</th><th>Object Name</th></tr>
        <tr><td colspan="2" class="loading">Fetching satellite data...</td></tr>
      </table>
    </div>
  </div>

  <script>
    const API_KEY = "jWG5rblhsL3PoLH39BU5iNrTwBXPrwMXL6CV0bvU";

    // NEO
    fetch(`https://api.nasa.gov/neo/rest/v1/feed?api_key=${API_KEY}`)
      .then(r => r.json()).then(data => {
        const table = document.getElementById("neo-table");
        table.innerHTML = `<tr><th>Name</th><th>Date</th><th>Diameter (km)</th><th>Velocity (km/h)</th><th>Miss Distance (km)</th><th>Status</th></tr>`;
        let asteroids = [];
        for (const [date, objects] of Object.entries(data.near_earth_objects)) {
          objects.forEach(obj => {
            asteroids.push({
              name: obj.name, date,
              diameter: obj.estimated_diameter.kilometers.estimated_diameter_max.toFixed(2),
              velocity: parseFloat(obj.close_approach_data[0].relative_velocity.kilometers_per_hour).toLocaleString(),
              distance: parseFloat(obj.close_approach_data[0].miss_distance.kilometers).toLocaleString(),
              hazardous: obj.is_potentially_hazardous_asteroid
            });
          });
        }
        asteroids.slice(0, 15).forEach(a => {
          table.innerHTML += `<tr>
            <td>${a.name}</td><td>${a.date}</td><td>${a.diameter}</td>
            <td>${a.velocity}</td><td>${a.distance}</td>
            <td class="${a.hazardous ? 'hazardous' : 'safe'}">${a.hazardous ? '⚠ HAZARDOUS' : '✓ SAFE'}</td>
          </tr>`;
        });
      });

    // Mars
    fetch(`https://api.nasa.gov/insight_weather/?api_key=${API_KEY}&feedtype=json&ver=1.0`)
      .then(r => r.json()).then(data => {
        const el = document.getElementById("mars-stats");
        const sols = data.sol_keys || [];
        if (!sols.length) { el.innerHTML = "Mars InSight mission has ended — no live data available."; return; }
        const latest = data[sols[sols.length - 1]];
        el.innerHTML = `
          <div class="stats-row">
            <div class="stat-box"><div class="stat">${latest?.AT?.av ?? "N/A"}°C</div><div class="stat-label">AVG TEMP</div></div>
            <div class="stat-box"><div class="stat">${latest?.AT?.mn ?? "N/A"}°C</div><div class="stat-label">MIN TEMP</div></div>
            <div class="stat-box"><div class="stat">${latest?.AT?.mx ?? "N/A"}°C</div><div class="stat-label">MAX TEMP</div></div>
            <div class="stat-box"><div class="stat">${latest?.PRE?.av ?? "N/A"} Pa</div><div class="stat-label">PRESSURE</div></div>
          </div>`;
        const temps = sols.map(s => data[s]?.AT?.av);
        Plotly.newPlot("mars-chart", [{
          x: sols.map(s => "Sol " + s), y: temps, type: "scatter", mode: "lines+markers",
          line: { color: "#ff4444" }, marker: { color: "#ff4444" }
        }], {
          paper_bgcolor: "transparent", plot_bgcolor: "transparent",
          font: { color: "#888", family: "Courier New" },
          xaxis: { gridcolor: "#ffffff11" }, yaxis: { gridcolor: "#ffffff11", title: "°C" },
          margin: { t: 10, b: 40, l: 50, r: 10 }, height: 200
        });
      });

    // Satellites
    fetch("https://celestrak.org/pub/TLE/catalog.txt")
      .then(r => r.text()).then(text => {
        const lines = text.trim().split("\n");
        const table = document.getElementById("sat-table");
        table.innerHTML = `<tr><th>#</th><th>Object Name</th></tr>`;
        for (let i = 0; i < Math.min(60, lines.length - 2); i += 3) {
          table.innerHTML += `<tr><td>${i/3 + 1}</td><td>${lines[i].trim()}</td></tr>`;
        }
      }).catch(() => {
        document.getElementById("sat-table").innerHTML = `<tr><th>#</th><th>Object Name</th></tr><tr><td colspan="2">Satellite data unavailable (CORS restriction)</td></tr>`;
      });
  </script>
</body>
</html>
